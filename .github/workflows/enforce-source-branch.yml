name: Enforce source branch

on:
  pull_request:
    branches: [main]

jobs:
  check-source-branch:
    name: Source branch must be develop
    runs-on: ubuntu-latest
    steps:
      - name: Fail if source is not develop
        if: github.head_ref != 'develop'
        run: |
          echo "PRs to main must come from the develop branch (got: ${{ github.head_ref }})."
          exit 1
